<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <!--
      Pixel-art "G" on a 5x7 grid (pixel size = 16, centered in 128 viewBox).
      Matches the Press Start 2P typography used across the site.
      Shape:
        . # # # .
        # . . . #
        # . . . .
        # . . # #
        # . . . #
        # . . . #
        . # # # .
    -->
    <g shape-rendering="crispEdges">
        <!-- top bar (row 0, cols 1-3) -->
        <rect x="40"  y="8"   width="48" height="16" />
        <!-- left stem (rows 1-5, col 0) -->
        <rect x="24"  y="24"  width="16" height="80" />
        <!-- right top (row 1, col 4) -->
        <rect x="88"  y="24"  width="16" height="16" />
        <!-- middle crossbar stub (row 3, col 3) -->
        <rect x="72"  y="56"  width="16" height="16" />
        <!-- right bottom (rows 3-5, col 4) -->
        <rect x="88"  y="56"  width="16" height="48" />
        <!-- bottom bar (row 6, cols 1-3) -->
        <rect x="40"  y="104" width="48" height="16" />
    </g>
    <style>
        rect { fill: #1a1a1a; }
        @media (prefers-color-scheme: dark) {
            rect { fill: #f5f5f5; }
        }
    </style>
</svg>
